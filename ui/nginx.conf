server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proof-of-payment files — proxied through backend so authentication is enforced
    location ^~ /api/v1/files/proof/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # Upload endpoint — proxy to backend
    location = /api/v1/files/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve public uploaded files directly from disk (logos, photos, media)
    location ^~ /api/v1/files/ {
        alias /usr/share/nginx/uploads/;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Proxy all other API calls to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
