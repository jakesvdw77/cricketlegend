# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name cricketlegend.co.za www.cricketlegend.co.za;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name cricketlegend.co.za www.cricketlegend.co.za;

    ssl_certificate     /etc/letsencrypt/live/cricketlegend.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricketlegend.co.za/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root  /usr/share/nginx/html;
    index index.html;

    # Upload endpoint — proxy to backend
    location = /api/v1/files/upload {
        proxy_pass         http://backend:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve uploaded files directly from disk
    location ^~ /api/v1/files/ {
        alias /usr/share/nginx/uploads/;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Proxy all other API calls to Spring Boot backend
    location /api/ {
        proxy_pass         http://backend:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
