<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cricket ball (red, top-right) -->
  <circle cx="22" cy="10" r="8" fill="#c0392b"/>
  <circle cx="22" cy="10" r="8" fill="none" stroke="#922b21" stroke-width="0.8"/>
  <!-- Ball seam lines -->
  <path d="M15.5 7.5 Q18 10 15.5 12.5" fill="none" stroke="#922b21" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M28.5 7.5 Q26 10 28.5 12.5" fill="none" stroke="#922b21" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Cricket bat handle -->
  <rect x="4" y="2" width="3.5" height="9" rx="1.5" fill="#8d6e4a"/>
  <!-- Bat blade -->
  <rect x="2.5" y="10" width="6.5" height="18" rx="2" fill="#c8a96e"/>
  <!-- Bat edge highlight -->
  <rect x="2.5" y="10" width="1.5" height="18" rx="1" fill="#b8956a" opacity="0.6"/>
</svg>
