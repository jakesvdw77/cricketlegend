version: '3.8'

services:
  db:
    image: postgres:16.2-alpine # Use the official Postgres image from Docker Hub
    restart: always
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: legend
      POSTGRES_DB: cricketlegend
    ports:
      - "5432:5432" # Map port 5432 on the host to port 5432 in the container
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist data in a named volume

volumes:
  postgres_data: # Define the named volume



