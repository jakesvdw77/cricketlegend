version: "3.9"

services:

  # ── PostgreSQL (app database) ─────────────────────────────────────────────
  db:
    image: postgres:16.2-alpine
    container_name: cricketlegend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: legend
      POSTGRES_DB: cricketlegend
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket -d cricketlegend"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak PostgreSQL ───────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KC_HOSTNAME: cricketlegend.co.za
      KC_HOSTNAME_STRICT: "false"
      KC_HTTPS_CERTIFICATE_FILE: /etc/letsencrypt/live/cricketlegend.co.za/fullchain.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/letsencrypt/live/cricketlegend.co.za/privkey.pem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8443:8443"
    volumes:
      - certbot_etc:/etc/letsencrypt:ro
      - ./keycloak/themes/cricketlegend:/opt/keycloak/themes/cricketlegend
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-network

  # ── Spring Boot backend ───────────────────────────────────────────────────
  backend:
    image: jakesvdwesthuizen/cricketlegend:latest
    container_name: cricketlegend-backend
    restart: unless-stopped
    user: "root"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cricketlegend
      SPRING_DATASOURCE_USERNAME: cricket
      SPRING_DATASOURCE_PASSWORD: legend
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://cricketlegend.co.za:8443/realms/cricketlegend
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/cricketlegend/protocol/openid-connect/certs
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ── React UI (nginx) ──────────────────────────────────────────────────────
  ui:
    image: jakesvdwesthuizen/cricketlegend-ui:latest
    container_name: cricketlegend-ui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./uploads:/usr/share/nginx/uploads
      - ./ui/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - app-network

  # ── Certbot (Let's Encrypt auto-renewal) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

volumes:
  db_data:
  keycloak_db_data:
  certbot_etc:
  certbot_var:
  certbot_www:

networks:
  app-network:
    driver: bridge
