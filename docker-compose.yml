version: "3.9"

services:

  # ── PostgreSQL (app database) ─────────────────────────────────────────────
  db:
    image: postgres:16.2-alpine
    container_name: cricketlegend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: legend
      POSTGRES_DB: cricketlegend
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket -d cricketlegend"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak PostgreSQL ───────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KC_HOSTNAME: 102.210.146.217
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/tls.key
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8443:8443"
    volumes:
      - ./keycloak/certs:/opt/keycloak/certs
      - ./keycloak/themes/cricketlegend:/opt/keycloak/themes/cricketlegend
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-network

  # ── Spring Boot backend ───────────────────────────────────────────────────
  backend:
    image: jakesvdwesthuizen/cricketlegend:latest
    container_name: cricketlegend-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cricketlegend
      SPRING_DATASOURCE_USERNAME: cricket
      SPRING_DATASOURCE_PASSWORD: legend
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://102.210.146.217:8443/realms/cricketlegend
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://102.210.146.217:8443/realms/cricketlegend/protocol/openid-connect/certs
    ports:
      - "8081:8081"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ── React UI (nginx) ──────────────────────────────────────────────────────
  ui:
    image: jakesvdwesthuizen/cricketlegend-ui:latest
    container_name: cricketlegend-ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:
  keycloak_db_data:
  uploads:

networks:
  app-network:
    driver: bridge
